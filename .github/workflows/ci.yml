name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install tooling
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install maturin pytest pytest-benchmark openpyxl pandas python-calamine xlsxwriter

      - name: Build extension (release, editable)
        run: .venv/bin/maturin develop --release

      - name: Run unit tests
        run: .venv/bin/pytest tests/

      - name: Run large read benchmarks (smoke size)
        env:
          FAST_XLSX_BENCH_ROWS: "400"
          FAST_XLSX_BENCH_COLS: "60"
        run: .venv/bin/pytest benchmarks/
