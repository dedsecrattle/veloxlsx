name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux (${{ matrix.platform.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { target: x86_64-unknown-linux-gnu, name: x86_64 }
          - { target: aarch64-unknown-linux-gnu, name: aarch64 }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist
          target: ${{ matrix.platform.target }}
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.name }}
          path: dist

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  macos:
    name: macOS (universal2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -o dist
          target: universal2-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    permissions:
      contents: read
    steps:
      - name: Gather artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
